services:
  - type: web
    name: ticketmanager-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @repo/types build &&
      pnpm --filter @repo/utils build &&
      pnpm --filter api prisma:generate &&
      pnpm --filter api build
    startCommand: sh start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set the following secrets in the Render dashboard (sync: false = manual entry):
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
