services:
  - type: web
    name: ticketmanager-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api prisma:generate && pnpm --filter api build
    startCommand: node apps/api/dist/main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Set the following secrets in the Render dashboard:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
