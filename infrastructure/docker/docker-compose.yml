services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketmanager
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketmanager-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: run API in Docker instead of locally.
  # Uncomment, then run: docker-compose up -d --build api
  # api:
  #   build:
  #     context: ../..
  #     dockerfile: infrastructure/docker/Dockerfile.api
  #   container_name: ticketmanager-api
  #   restart: unless-stopped
  #   env_file:
  #     - ../../.env.local          # provides AUTH0_*, AI keys, etc.
  #   environment:
  #     # Override to use internal Docker network (not host-mapped ports)
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ticketmanager
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #   ports:
  #     - '4000:4000'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
  #     interval: 30s
  #     timeout: 10s
  #     start_period: 30s
  #     retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ticketmanager-network
