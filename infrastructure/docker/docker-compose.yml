  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ../../apps/api:/app/apps/api
  #     - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ticketmanager-network
